<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>リアルタイム共有ホワイトボード</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700&family=Space+Mono:wght@400;700&display=swap');
  :root {
    --bg: #f5f0e8;
    --panel: #1a1a2e;
    --accent: #e84545;
    --accent2: #f5a623;
    --white: #ffffff;
    --border: #1a1a2e;
    --shadow: 4px 4px 0px #1a1a2e;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Zen Kaku Gothic New', sans-serif;
    background: var(--bg);
    background-image: radial-gradient(circle at 1px 1px, #c5b89a 1px, transparent 0);
    background-size: 24px 24px;
    height: 100vh; display: flex; flex-direction: column;
    overflow: hidden; touch-action: none;
  }
  header {
    background: var(--panel); color: var(--white);
    display: flex; align-items: center; gap: 12px;
    padding: 10px 16px; border-bottom: 3px solid var(--accent);
    flex-shrink: 0; flex-wrap: wrap;
  }
  .logo { font-family: 'Space Mono', monospace; font-size: 15px; font-weight: 700; color: var(--accent2); }
  .room-badge {
    background: var(--accent); color: #fff;
    font-size: 11px; font-weight: 700; padding: 2px 10px;
    border-radius: 20px; letter-spacing: 1px;
  }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #555; transition: background 0.3s; flex-shrink: 0; }
  .status-dot.connected { background: #4caf50; box-shadow: 0 0 6px #4caf50; }
  .spacer { flex: 1; }
  .room-input-area { display: flex; align-items: center; gap: 8px; }
  .room-input-area input {
    background: rgba(255,255,255,0.12); border: 1.5px solid rgba(255,255,255,0.3);
    color: #fff; padding: 4px 10px; font-size: 13px;
    font-family: 'Space Mono', monospace; border-radius: 4px; width: 150px; outline: none;
  }
  .room-input-area input::placeholder { color: rgba(255,255,255,0.4); }
  .room-join-btn {
    background: var(--accent); color: #fff; border: none;
    padding: 5px 14px; font-size: 12px; font-family: 'Zen Kaku Gothic New', sans-serif;
    font-weight: 700; cursor: pointer; border-radius: 4px; transition: opacity 0.2s;
  }
  .room-join-btn:hover { opacity: 0.85; }
  .toolbar {
    background: var(--white); border-bottom: 3px solid var(--border);
    display: flex; align-items: center; gap: 6px;
    padding: 8px 12px; flex-shrink: 0; flex-wrap: wrap;
    box-shadow: var(--shadow); position: relative; z-index: 10;
  }
  .tool-group {
    display: flex; align-items: center; gap: 4px;
    border-right: 2px solid #ddd; padding-right: 10px; margin-right: 4px;
  }
  .tool-group:last-child { border-right: none; }
  .tool-btn {
    width: 36px; height: 36px; border: 2px solid var(--border);
    background: var(--white); cursor: pointer; display: flex;
    align-items: center; justify-content: center; font-size: 17px;
    transition: all 0.1s; border-radius: 6px; box-shadow: 2px 2px 0 var(--border);
  }
  .tool-btn:hover { transform: translate(-1px,-1px); box-shadow: 3px 3px 0 var(--border); }
  .tool-btn:active { transform: translate(1px,1px); box-shadow: 1px 1px 0 var(--border); }
  .tool-btn.active { background: var(--panel); color: var(--white); box-shadow: 2px 2px 0 var(--accent); }
  .color-swatch {
    width: 28px; height: 28px; border: 2px solid var(--border);
    border-radius: 50%; cursor: pointer; transition: transform 0.1s; box-shadow: 2px 2px 0 var(--border);
  }
  .color-swatch.active { transform: scale(1.25); box-shadow: 0 0 0 3px var(--panel); }
  input[type="color"] {
    width: 28px; height: 28px; border: 2px solid var(--border);
    border-radius: 50%; cursor: pointer; padding: 0; background: none; box-shadow: 2px 2px 0 var(--border);
  }
  .size-label { font-size: 11px; color: #888; white-space: nowrap; }
  input[type="range"] { width: 70px; accent-color: var(--accent); }
  #textInput {
    position: absolute; border: 2px dashed var(--accent);
    background: rgba(255,255,255,0.9); padding: 4px 8px; font-size: 16px;
    outline: none; min-width: 120px; border-radius: 4px; display: none; z-index: 100;
  }
  .canvas-wrap { flex: 1; position: relative; overflow: hidden; }
  canvas { display: block; cursor: crosshair; touch-action: none; }
  canvas.eraser-mode { cursor: cell; }
  canvas.text-mode { cursor: text; }
  .clear-confirm {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
    background: var(--white); border: 3px solid var(--border);
    box-shadow: 6px 6px 0 var(--border); padding: 20px 28px;
    z-index: 200; text-align: center; display: none;
  }
  .clear-confirm p { margin-bottom: 14px; font-weight: 700; }
  .clear-confirm-btns { display: flex; gap: 10px; justify-content: center; }
  .clear-confirm-btns button {
    padding: 8px 20px; border: 2px solid var(--border);
    font-family: 'Zen Kaku Gothic New', sans-serif; font-size: 14px;
    cursor: pointer; box-shadow: 2px 2px 0 var(--border);
  }
  .btn-danger { background: var(--accent); color: #fff; }
  .btn-cancel { background: #eee; }
  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--panel); color: #fff; padding: 10px 20px; border-radius: 4px;
    font-size: 13px; opacity: 0; transition: opacity 0.3s; z-index: 500;
    pointer-events: none; white-space: nowrap;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<header>
  <span class="logo">WHITEBOARD</span>
  <span class="room-badge" id="roomBadge">未接続</span>
  <span class="status-dot" id="statusDot"></span>
  <span class="spacer"></span>
  <div class="room-input-area">
    <input type="text" id="roomInput" placeholder="ルームID" value="main-room">
    <button class="room-join-btn" onclick="joinRoom()">入室</button>
  </div>
</header>

<div class="toolbar">
  <div class="tool-group">
    <button class="tool-btn active" id="btn-pen" onclick="setTool('pen')" title="ペン">🖊</button>
    <button class="tool-btn" id="btn-eraser" onclick="setTool('eraser')" title="消しゴム">◻</button>
    <button class="tool-btn" id="btn-text" onclick="setTool('text')" title="テキスト">T</button>
  </div>
  <div class="tool-group">
    <div class="color-swatch active" style="background:#1a1a2e" onclick="setColor('#1a1a2e',this)"></div>
    <div class="color-swatch" style="background:#e84545" onclick="setColor('#e84545',this)"></div>
    <div class="color-swatch" style="background:#f5a623" onclick="setColor('#f5a623',this)"></div>
    <div class="color-swatch" style="background:#2196f3" onclick="setColor('#2196f3',this)"></div>
    <div class="color-swatch" style="background:#4caf50" onclick="setColor('#4caf50',this)"></div>
    <div class="color-swatch" style="background:#fff;border:2px solid #333" onclick="setColor('#ffffff',this)"></div>
    <input type="color" value="#1a1a2e" onchange="setColor(this.value,null)" title="カスタム色">
  </div>
  <div class="tool-group">
    <span class="size-label">太さ</span>
    <input type="range" id="sizeSlider" min="1" max="40" value="4" oninput="setSize(this.value)">
    <span id="sizeVal" style="font-size:12px;min-width:24px">4</span>
  </div>
  <div class="tool-group">
    <button class="tool-btn" onclick="undoLast()" title="元に戻す（自分の最後）">↩</button>
    <button class="tool-btn" onclick="showClearConfirm()" title="全消去" style="color:var(--accent)">🗑</button>
  </div>
</div>

<div class="canvas-wrap" id="canvasWrap">
  <canvas id="canvas"></canvas>
  <input type="text" id="textInput" placeholder="テキストを入力... (Enterで確定)">
</div>

<div class="clear-confirm" id="clearConfirm">
  <p>⚠️ ホワイトボードを全消去しますか？<br><small>（全員の画面から消えます）</small></p>
  <div class="clear-confirm-btns">
    <button class="btn-danger" onclick="clearAll()">消去する</button>
    <button class="btn-cancel" onclick="hideClearConfirm()">キャンセル</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
// ── Firebase 初期化 ──
firebase.initializeApp({
  apiKey: "AIzaSyALywtz46vDcJ1H_gqeigy8hKMEe-od0LI",
  authDomain: "seitokai-cfe2d.firebaseapp.com",
  databaseURL: "https://seitokai-cfe2d-default-rtdb.firebaseio.com",
  projectId: "seitokai-cfe2d",
  storageBucket: "seitokai-cfe2d.firebasestorage.app",
  messagingSenderId: "956920989538",
  appId: "1:956920989538:web:2734261bde2483dfef8e3b"
});
const db = firebase.database();

// ── 状態 ──
let strokesRef = null, currentListener = null;
let tool = 'pen', currentColor = '#1a1a2e', currentSize = 4;
let isDrawing = false, currentStroke = null, strokeId = null;
let myId = 'u_' + Math.random().toString(36).slice(2, 8);
let localStrokes = {}, moveCount = 0;

// ── キャンバス ──
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const wrap = document.getElementById('canvasWrap');

function resizeCanvas() {
  canvas.width = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
  redrawAll();
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// ── ルーム入室 ──
function joinRoom() {
  const roomId = document.getElementById('roomInput').value.trim();
  if (!roomId) { showToast('ルームIDを入力してください'); return; }
  if (strokesRef && currentListener) strokesRef.off('value', currentListener);

  strokesRef = db.ref('rooms/' + roomId + '/strokes');
  localStrokes = {};
  redrawAll();

  currentListener = strokesRef.on('value', snap => {
    localStrokes = snap.val() || {};
    redrawAll();
  });

  document.getElementById('roomBadge').textContent = roomId;
  document.getElementById('statusDot').classList.add('connected');
  showToast('✅ ルーム「' + roomId + '」に接続しました！');
}

// ── 描画 ──
function redrawAll() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  Object.values(localStrokes)
    .sort((a, b) => (a.ts || 0) - (b.ts || 0))
    .forEach(renderStroke);
}

function renderStroke(s) {
  if (s.tool === 'text') {
    ctx.font = `${s.size * 4 + 12}px 'Zen Kaku Gothic New', sans-serif`;
    ctx.fillStyle = s.color;
    ctx.globalCompositeOperation = 'source-over';
    ctx.fillText(s.text || '', s.x, s.y);
    return;
  }
  if (!s.points || s.points.length < 1) return;
  ctx.beginPath();
  ctx.strokeStyle = s.color;
  ctx.lineWidth = s.size;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.globalCompositeOperation = s.tool === 'eraser' ? 'destination-out' : 'source-over';
  ctx.moveTo(s.points[0][0], s.points[0][1]);
  for (let i = 1; i < s.points.length; i++) ctx.lineTo(s.points[i][0], s.points[i][1]);
  ctx.stroke();
  ctx.globalCompositeOperation = 'source-over';
}

// ── イベント ──
function getPos(e) {
  const r = canvas.getBoundingClientRect();
  const src = e.touches ? e.touches[0] : e;
  return { x: src.clientX - r.left, y: src.clientY - r.top };
}

function onDown(e) {
  e.preventDefault();
  if (!strokesRef) { showToast('先に「入室」してください'); return; }
  if (tool === 'text') return;
  const p = getPos(e);
  isDrawing = true;
  strokeId = myId + '_' + Date.now();
  currentStroke = { tool, color: currentColor, size: currentSize, points: [[p.x, p.y]], ts: Date.now() };
}

function onMove(e) {
  e.preventDefault();
  if (!isDrawing) return;
  const p = getPos(e);
  currentStroke.points.push([p.x, p.y]);
  localStrokes[strokeId] = currentStroke;
  redrawAll();
  if (++moveCount % 6 === 0) strokesRef.child(strokeId).set(currentStroke);
}

function onUp(e) {
  if (!isDrawing) return;
  isDrawing = false; moveCount = 0;
  if (strokesRef && currentStroke) strokesRef.child(strokeId).set(currentStroke);
  currentStroke = null;
}

canvas.addEventListener('mousedown', onDown);
canvas.addEventListener('mousemove', onMove);
canvas.addEventListener('mouseup', onUp);
canvas.addEventListener('mouseleave', onUp);
canvas.addEventListener('touchstart', onDown, { passive: false });
canvas.addEventListener('touchmove', onMove, { passive: false });
canvas.addEventListener('touchend', onUp);

// ── テキスト ──
canvas.addEventListener('click', e => {
  if (tool !== 'text') return;
  if (!strokesRef) { showToast('先に「入室」してください'); return; }
  const p = getPos(e);
  const inp = document.getElementById('textInput');
  inp.style.display = 'block';
  inp.style.left = p.x + 'px';
  inp.style.top = (p.y - 24) + 'px';
  inp.style.fontSize = (currentSize * 4 + 12) + 'px';
  inp.style.color = currentColor;
  inp.value = '';
  inp.focus();
  inp._pos = p;
});

document.getElementById('textInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') commitText();
  if (e.key === 'Escape') document.getElementById('textInput').style.display = 'none';
});
document.getElementById('textInput').addEventListener('blur', commitText);

function commitText() {
  const inp = document.getElementById('textInput');
  const val = inp.value.trim();
  if (val && strokesRef) {
    strokesRef.child(myId + '_' + Date.now()).set({
      tool: 'text', color: currentColor, size: currentSize,
      text: val, x: inp._pos.x, y: inp._pos.y, ts: Date.now()
    });
  }
  inp.style.display = 'none';
}

// ── アクション ──
function undoLast() {
  if (!strokesRef) return;
  const mine = Object.entries(localStrokes)
    .filter(([k]) => k.startsWith(myId))
    .sort((a, b) => (a[1].ts || 0) - (b[1].ts || 0));
  if (!mine.length) { showToast('元に戻せるものがありません'); return; }
  strokesRef.child(mine[mine.length - 1][0]).remove();
}

function showClearConfirm() { document.getElementById('clearConfirm').style.display = 'block'; }
function hideClearConfirm() { document.getElementById('clearConfirm').style.display = 'none'; }
function clearAll() { if (strokesRef) strokesRef.set(null); hideClearConfirm(); }

// ── ツール・色・太さ ──
function setTool(t) {
  tool = t;
  ['pen','eraser','text'].forEach(n => document.getElementById('btn-' + n).classList.remove('active'));
  document.getElementById('btn-' + t).classList.add('active');
  canvas.className = t === 'eraser' ? 'eraser-mode' : t === 'text' ? 'text-mode' : '';
}

function setColor(c, el) {
  currentColor = c;
  document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
  if (el) el.classList.add('active');
}

function setSize(v) {
  currentSize = parseInt(v);
  document.getElementById('sizeVal').textContent = v;
}

// ── トースト ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// 起動時に自動入室
window.addEventListener('load', joinRoom);
</script>
</body>
</html>
